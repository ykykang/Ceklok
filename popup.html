<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ceklok</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="ticket-header">
      <div>
        <p class="eyebrow">CEKLOK</p>
        <h1 id="todayDate" class="today-date">—</h1>
      </div>
      <button id="settingsBtn" class="icon-btn" aria-label="Settings" title="Settings">⚙</button>
    </header>

    <section id="todayAction" class="today-card"></section>

    <section class="progress-section">
      <div class="progress-label-row">
        <span class="progress-count"><span id="officeCount">0</span><span class="progress-sep">/</span><span id="targetVal">12</span></span>
        <span class="progress-caption">office days this month</span>
      </div>
      <div class="progress-bar-track">
        <div id="progressBar" class="progress-bar-fill"></div>
      </div>
      <p id="insightText" class="insight">Loading…</p>
    </section>

    <section class="punchcard">
      <div class="punchcard-head">
        <span id="monthLabel" class="eyebrow">—</span>
        <div class="legend">
          <span class="legend-office">■ Office</span>
          <span class="legend-wfh">□ WFH</span>
        </div>
      </div>
      <div class="weekday-row">
        <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
      </div>
      <div id="grid" class="grid"></div>
    </section>

    <section id="pastDatePanel" class="past-date-panel hidden"></section>

    <section id="settingsPanel" class="settings-panel hidden">
      <label class="field">
        <span>Monthly office target</span>
        <input type="number" id="targetInput" min="1" max="31" />
      </label>
      <button id="saveSettingsBtn" class="primary-btn">Save settings</button>
      <p id="savedNote" class="saved-note hidden">Saved ✓</p>
    </section>

    <footer class="footnote">Resets on the 1st each month — previous months stay saved.</footer>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
